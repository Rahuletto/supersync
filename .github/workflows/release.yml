name: Build & Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0)"
        required: true
        type: string
      device_flow_client_id:
        description: "GitHub OAuth Device Flow Client ID (optional override)"
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate version matches manifest
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ "$MANIFEST_VERSION" != "$INPUT_VERSION" ]; then
            echo "❌ manifest.json version ($MANIFEST_VERSION) does not match input version ($INPUT_VERSION)"
            echo "Update manifest.json first, then run this workflow."
            exit 1
          fi
          echo "✅ Version match: $INPUT_VERSION"

      - name: Build plugin
        env:
          DEVICE_FLOW_CLIENT_ID: ${{ github.event.inputs.device_flow_client_id || secrets.DEVICE_FLOW_CLIENT_ID }}
        run: bun run build

      - name: Update versions.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          MIN_APP=$(node -p "require('./manifest.json').minAppVersion")
          node -e "
            const fs = require('fs');
            const path = './versions.json';
            const versions = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, 'utf8')) : {};
            versions['$VERSION'] = '$MIN_APP';
            fs.writeFileSync(path, JSON.stringify(versions, null, 2) + '\n');
            console.log('Updated versions.json:', versions);
          "

      - name: Commit versions.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --staged --quiet || git commit -m "chore: bump versions.json for ${{ github.event.inputs.version }}"
          git push

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
