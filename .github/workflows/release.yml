name: Build & Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.1)"
        required: true
        type: string
      device_flow_client_id:
        description: "GitHub OAuth Device Flow Client ID (optional override)"
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Bump manifest.json and versions.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          node -e "
            const fs = require('fs');

            // Update manifest.json
            const manifest = JSON.parse(fs.readFileSync('./manifest.json', 'utf8'));
            manifest.version = '$VERSION';
            fs.writeFileSync('./manifest.json', JSON.stringify(manifest, null, 2) + '\n');
            console.log('manifest.json version set to', manifest.version);

            // Update versions.json
            const vPath = './versions.json';
            const versions = fs.existsSync(vPath) ? JSON.parse(fs.readFileSync(vPath, 'utf8')) : {};
            versions['$VERSION'] = manifest.minAppVersion;
            fs.writeFileSync(vPath, JSON.stringify(versions, null, 2) + '\n');
            console.log('versions.json updated:', versions);
          "

      - name: Build plugin
        env:
          DEVICE_FLOW_CLIENT_ID: ${{ github.event.inputs.device_flow_client_id || secrets.DEVICE_FLOW_CLIENT_ID }}
        run: bun run build

      - name: Update bun lockfile
        run: |
          bun install

      - name: Commit version bumps and lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json bun.lock
          git diff --staged --quiet || git commit -m "chore: release ${{ github.event.inputs.version }}"
          git push

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
